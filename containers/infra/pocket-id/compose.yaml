  #   secrets:
  #     - beszel_token

networks:
  edge:
    name: edge
    external: true

secrets:
  encryption_key:
    file: ./encryption_key.secret
  license_key:
    file: ./license_key.secret
  smtp_passwd:
    file: ./smtp_passwd.secret
