services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.1.0
    restart: unless-stopped
    networks:
      - edge
    volumes:
      - ./data:/app/data
    environment:
      APP_URL: https://auth.laddisonroach.com
      TRUST_PROXY: "true"
      ENCRYPTION_KEY: /run/secrets/encryption_key
      UI_CONFIG_DISABLED: "true"
      MAXMIND_LICENSE_KEY_FILE: /run/secrets/license_key
      ANALYTICS_DISABLED: "true"
      EMAILS_VERIFIED: "true"
      ALLOW_USER_SIGNUPS: withToken
      EMAIL_ONE_TIME_ACCESS_AS_ADMIN_ENABLED: "true"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_FROM: no-reply@laddisonroach.com
      SMTP_USER: contact@laddisonroach.com
      SMTP_PASSWORD_FILE: /run/secrets/smtp_passwd
      SMTP_TLS: starttls
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    secrets:
      - encryption_key
      - license_key
      - smtp_passwd

